    <line x1="230" y1="105" x2="252" y2="62" stroke="#00ccaa" stroke-width="7" stroke-linecap="round"/>
    <line x1="230" y1="105" x2="252" y2="62" stroke="#00ffcc" stroke-width="4" stroke-linecap="round"/>
    <circle cx="148" cy="60" r="11" fill="#006655"/>
    <circle cx="148" cy="60" r="10" fill="url(#tip-glow)"/>
    <circle cx="252" cy="60" r="11" fill="#006655"/>
    <circle cx="252" cy="60" r="10" fill="url(#tip-glow)"/>

    <!-- Wings -->
    <ellipse cx="116" cy="170" rx="64" ry="28" transform="rotate(-20 116 170)" fill="url(#wing-grad)" stroke="#00ffcc" stroke-width="1" stroke-opacity="0.3"/>
    <ellipse cx="284" cy="170" rx="64" ry="28" transform="rotate(20 284 170)" fill="url(#wing-grad-r)" stroke="#00ffcc" stroke-width="1" stroke-opacity="0.3"/>
    <ellipse cx="130" cy="212" rx="44" ry="20" transform="rotate(-15 130 212)" fill="url(#wing-grad)" stroke="#00ffcc" stroke-width="0.8" stroke-opacity="0.2"/>
    <ellipse cx="270" cy="212" rx="44" ry="20" transform="rotate(15 270 212)" fill="url(#wing-grad-r)" stroke="#00ffcc" stroke-width="0.8" stroke-opacity="0.2"/>

