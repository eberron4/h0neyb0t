    <polygon points="1299,166 1324,152 1349,166 1349,194 1324,208 1299,194"/>
    <polygon points="1349,166 1374,152 1399,166 1399,194 1374,208 1349,194"/>
    <polygon points="1399,166 1424,152 1449,166 1449,194 1424,208 1399,194"/>
    <polygon points="1449,166 1474,152 1499,166 1499,194 1474,208 1449,194"/>
    <polygon points="1499,166 1524,152 1549,166 1549,194 1524,208 1499,194"/>
    <polygon points="1324,208 1349,194 1374,208 1374,236 1349,250 1324,236"/>
    <polygon points="1374,208 1399,194 1424,208 1424,236 1399,250 1374,236"/>
    <polygon points="1424,208 1449,194 1474,208 1474,236 1449,250 1424,236"/>
    <polygon points="1474,208 1499,194 1524,208 1524,236 1499,250 1474,236"/>
    <polygon points="1349,250 1374,236 1399,250 1399,278 1374,292 1349,278"/>
    <polygon points="1399,250 1424,236 1449,250 1449,278 1424,292 1399,278"/>
    <polygon points="1449,250 1474,236 1499,250 1499,278 1474,292 1449,278"/>
    <polygon points="1499,250 1524,236 1549,250 1549,278 1524,292 1499,278"/>
    <polygon points="1374,292 1399,278 1424,292 1424,320 1399,334 1374,320"/>
    <polygon points="1424,292 1449,278 1474,292 1474,320 1449,334 1424,320"/>
