      <circle cx="214" cy="119" r="6" fill="#00ffdd"/>
    </g>
    <circle cx="183" cy="116" r="2.5" fill="#ffffff" opacity="0.5"/>
    <circle cx="211" cy="116" r="2.5" fill="#ffffff" opacity="0.5"/>

    <!-- Thorax -->
    <polygon points="200,154 239,174 239,214 200,234 161,214 161,174" fill="#005544"/>
    <polygon points="200,152 238,172 238,212 200,232 162,212 162,172" fill="url(#hex-deep)"/>
    <polygon points="200,152 238,172 200,178 162,172" fill="#44ffdd" opacity="0.2"/>
    <polygon points="200,168 218,178 218,198 200,208 182,198 182,178" fill="#050505" opacity="0.45"/>
    <circle cx="200" cy="188" r="4" fill="#00ffcc" opacity="0.3"/>

    <!-- Abdomen 1 -->
