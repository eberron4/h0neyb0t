<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1584 396" width="1584" height="396">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#050505"/>
      <stop offset="40%" stop-color="#071512"/>
      <stop offset="60%" stop-color="#071512"/>
      <stop offset="100%" stop-color="#050505"/>
    </linearGradient>
    <!-- Hex body gradients -->
    <linearGradient id="hex-lit" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#33ffdd"/>
      <stop offset="50%" stop-color="#00ffcc"/>
      <stop offset="100%" stop-color="#009977"/>
    </linearGradient>
    <linearGradient id="hex-deep" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00ffcc"/>
      <stop offset="100%" stop-color="#006655"/>
    </linearGradient>
    <linearGradient id="hex-abd" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00ddaa"/>
      <stop offset="100%" stop-color="#005544"/>
    </linearGradient>
    <linearGradient id="wing-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00ffcc" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#00ffcc" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="wing-grad-r" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00ffcc" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#00ffcc" stop-opacity="0.05"/>
    </linearGradient>
    <radialGradient id="tip-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#88ffee"/>
      <stop offset="60%" stop-color="#00ffcc"/>
      <stop offset="100%" stop-color="#009977"/>
    </radialGradient>
    <filter id="eye-glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
    <filter id="text-glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="text-glow-soft">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

