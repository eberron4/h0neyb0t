    <polygon points="110,124 135,110 160,124 160,152 135,166 110,152"/>
    <polygon points="160,124 185,110 210,124 210,152 185,166 160,152"/>
    <polygon points="210,124 235,110 260,124 260,152 235,166 210,152"/>
