    <line x1="0" y1="16" x2="1584" y2="16" stroke="#00ffcc" stroke-width="1"/>
  </g>
  <rect width="1584" height="396" fill="none" style="background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,255,204,0.02) 2px, rgba(0,255,204,0.02) 4px)"/>

  <!-- Horizontal accent line -->
