    <polygon points="200,230 233,246 233,278 200,294 167,278 167,246" fill="url(#hex-abd)"/>
    <polygon points="200,230 233,246 200,252 167,246" fill="#33ddbb" opacity="0.18"/>
    <rect x="172" y="256" width="56" height="11" rx="2" fill="#050505" opacity="0.5"/>

    <!-- Abdomen 2 -->
    <polygon points="200,293 227,306 227,332 200,345 173,332 173,306" fill="#003830"/>
    <polygon points="200,291 226,304 226,330 200,343 174,330 174,304" fill="url(#hex-abd)" opacity="0.85"/>
    <polygon points="200,291 226,304 200,308 174,304" fill="#33ddbb" opacity="0.12"/>
    <rect x="179" y="312" width="42" height="9" rx="2" fill="#050505" opacity="0.45"/>

    <!-- Stinger -->
    <polygon points="190,341 210,341 200,368" fill="#007755"/>
    <polygon points="193,341 207,341 200,364" fill="#00aa88"/>
    <polygon points="198,341 202,341 200,360" fill="#00ffcc" opacity="0.3"/>
  </g>

  <!-- === TEXT - right of bee === -->
  <g filter="url(#text-glow)">
    <text x="980" y="175" text-anchor="middle"
          font-family="'JetBrains Mono', 'SF Mono', 'Fira Code', 'Courier New', monospace"
          font-size="64" font-weight="700" fill="#00ffcc"
          letter-spacing="6">h0neyb0t</text>
  </g>
  <g filter="url(#text-glow-soft)">
    <text x="980" y="220" text-anchor="middle"
          font-family="'JetBrains Mono', 'SF Mono', 'Fira Code', 'Courier New', monospace"
          font-size="18" font-weight="400" fill="#00ffcc" fill-opacity="0.5"
          letter-spacing="8">CYBERSECURITY // BLOCKCHAIN // AI</text>
  </g>

  <!-- Tagline -->
  <text x="980" y="260" text-anchor="middle"
        font-family="'JetBrains Mono', 'SF Mono', 'Fira Code', 'Courier New', monospace"
        font-size="14" font-weight="300" fill="#ffffff" fill-opacity="0.3"
        letter-spacing="3">SECURING ON-CHAIN VALUE</text>

  <!-- Top edge glow line -->
