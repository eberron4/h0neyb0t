    <polygon points="85,166 110,152 135,166 135,194 110,208 85,194"/>
    <polygon points="135,166 160,152 185,166 185,194 160,208 135,194"/>
    <polygon points="185,166 210,152 235,166 235,194 210,208 185,194"/>
    <polygon points="235,166 260,152 285,166 285,194 260,208 235,194"/>
    <!-- Row 5 -->
    <polygon points="60,208 85,194 110,208 110,236 85,250 60,236"/>
    <polygon points="110,208 135,194 160,208 160,236 135,250 110,236"/>
    <polygon points="160,208 185,194 210,208 210,236 185,250 160,236"/>
    <polygon points="210,208 235,194 260,208 260,236 235,250 210,236"/>
    <!-- Row 6 -->
    <polygon points="35,250 60,236 85,250 85,278 60,292 35,278"/>
    <polygon points="85,250 110,236 135,250 135,278 110,292 85,278"/>
    <polygon points="135,250 160,236 185,250 185,278 160,292 135,278"/>
    <polygon points="185,250 210,236 235,250 235,278 210,292 185,278"/>
    <!-- Row 7 -->
    <polygon points="60,292 85,278 110,292 110,320 85,334 60,320"/>
    <polygon points="110,292 135,278 160,292 160,320 135,334 110,320"/>
    <polygon points="160,292 185,278 210,292 210,320 185,334 160,320"/>
    <!-- Row 8 -->
