    <polygon points="1274,40 1299,26 1324,40 1324,68 1299,82 1274,68"/>
    <polygon points="1324,40 1349,26 1374,40 1374,68 1349,82 1324,68"/>
    <polygon points="1374,40 1399,26 1424,40 1424,68 1399,82 1374,68"/>
    <polygon points="1424,40 1449,26 1474,40 1474,68 1449,82 1424,68"/>
    <polygon points="1474,40 1499,26 1524,40 1524,68 1499,82 1474,68"/>
    <polygon points="1249,82 1274,68 1299,82 1299,110 1274,124 1249,110"/>
    <polygon points="1299,82 1324,68 1349,82 1349,110 1324,124 1299,110"/>
    <polygon points="1349,82 1374,68 1399,82 1399,110 1374,124 1349,110"/>
    <polygon points="1399,82 1424,68 1449,82 1449,110 1424,124 1399,110"/>
    <polygon points="1449,82 1474,68 1499,82 1499,110 1474,124 1449,110"/>
    <polygon points="1499,82 1524,68 1549,82 1549,110 1524,124 1499,110"/>
    <polygon points="1274,124 1299,110 1324,124 1324,152 1299,166 1274,152"/>
    <polygon points="1324,124 1349,110 1374,124 1374,152 1349,166 1324,152"/>
    <polygon points="1374,124 1399,110 1424,124 1424,152 1399,166 1374,152"/>
